name: Web

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6.0.7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install
      - name: Build web app
        run: pnpm --filter @solana/rewards-program-web build
